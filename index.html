                                                    <div className="flex items-center gap-2 mb-2">
                                                        <input
                                                            className="input-surface px-3 py-2 text-sm w-full"
                                                            value={parsedMeal.title}
                                                            onChange={(e) => handleEditorMealTitleChange(index, e.target.value)}
                                                            placeholder="اسم الوجبة"
                                                        />
                                                        <button className="secondary-btn icon-action-btn" onClick={() => handleEditorRemoveMeal(index)}>
                                                            <i className="fas fa-trash"></i>
                                                        </button>
                                                    </div>

                                                    <div className="space-y-2">
                                                        <div className="hidden sm:grid sm:grid-cols-[1fr_110px_90px_90px_auto] gap-2 items-center px-1">
                                                            <span className="planner-grid-head">المكوّن</span>
                                                            <span className="planner-grid-head">الوزن</span>
                                                            <span className="planner-grid-head">البروتين</span>
                                                            <span className="planner-grid-head">الكارب</span>
                                                            <span></span>
                                                        </div>

                                                        {parsedMeal.entries.map((entry, entryIndex) => (
                                                            <div key={`${meal.id}-entry-${entryIndex}`} className="planner-row grid grid-cols-1 sm:grid-cols-[1fr_110px_90px_90px_auto] gap-2 items-center">
                                                                <div>
                                                                    <label className="planner-grid-head sm:hidden block mb-1">المكوّن</label>
                                                                    <input
                                                                        className="input-surface px-3 py-2 text-sm"
                                                                        value={entry.food}
                                                                        onChange={(e) => handleEditorMealEntryChange(index, entryIndex, 'food', e.target.value)}
                                                                        placeholder="المكون (مثال: دجاج)"
                                                                    />
                                                                </div>
                                                                <div>
                                                                    <label className="planner-grid-head sm:hidden block mb-1">الوزن</label>
                                                                    <input
                                                                        className="input-surface px-3 py-2 text-sm"
                                                                        value={entry.weight}
                                                                        onChange={(e) => handleEditorMealEntryChange(index, entryIndex, 'weight', e.target.value)}
                                                                        placeholder="الوزن (مثال: 200g)"
                                                                    />
                                                                </div>
                                                                <div>
                                                                    <label className="planner-grid-head sm:hidden block mb-1">البروتين</label>
                                                                    <input
                                                                        type="number"
                                                                        className="input-surface px-3 py-2 text-sm"
                                                                        value={entry.protein}
                                                                        onChange={(e) => handleEditorMealEntryChange(index, entryIndex, 'protein', e.target.value)}
                                                                        placeholder="بروتين"
                                                                    />
                                                                </div>
                                                                <div>
                                                                    <label className="planner-grid-head sm:hidden block mb-1">الكارب</label>
                                                                    <input
                                                                        type="number"
                                                                        className="input-surface px-3 py-2 text-sm"
                                                                        value={entry.carbs}
                                                                        onChange={(e) => handleEditorMealEntryChange(index, entryIndex, 'carbs', e.target.value)}
                                                                        placeholder="كارب"
                                                                    />
                                                                </div>
                                                                <div>
                                                                    <label className="planner-grid-head sm:hidden block mb-1">حذف</label>
                                                                    <button className="secondary-btn icon-action-btn" onClick={() => handleEditorRemoveMealEntry(index, entryIndex)}>
                                                                        <i className="fas fa-minus"></i>
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    <button className="secondary-btn px-3 py-2 text-sm mt-2" onClick={() => handleEditorAddMealEntry(index)}>
                                                        <i className="fas fa-plus ml-1"></i>
                                                        إضافة مكون
                                                    </button>
                                                </div>
                                            );
                                        })()
                                    ))}
                                </div>

                                <button onClick={handleEditorAddMeal} className="primary-btn px-4 py-2 text-sm mt-3">
                                    <i className="fas fa-plus ml-1"></i>
                                    إضافة وجبة
                                </button>
                            </div>

                            <p className="muted-text text-xs">
                                ملاحظة: التعديلات تُحفظ مباشرة، ويمكنك الرجوع للتتبع عبر زر الإعدادات بالأعلى.
                            </p>
                        </div>
                    ) : currentPage === 'metrics' ? (
                    <ProgressMetricsPage
                        entries={metricsEntries}
                        form={metricsForm}
                        onFormChange={updateMetricsForm}
                        onAdd={handleAddMetricsEntry}
                        onDelete={handleDeleteMetricsEntry}
                        themeMode={themeMode}
                    />
                    ) : (
                    <>
                    <div className="card p-4">
                        <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
                            <h3 className="font-bold">مهمة اليوم</h3>
                            <span className="badge">{progress}% مكتمل</span>
                        </div>
                        <p className="muted-text text-sm mb-3">
                            {nextExercise ? `التمرين التالي: ${nextExercise.name}` : 'أكملت تمارين اليوم، ممتاز!'}
                        </p>
                        <div className="hero-metrics">
                            <div className="metric-chip">
                                <strong>{completedExercises.length}/{dayExercises.length}</strong>
                                <span>تمارين</span>
                            </div>
                            <div className="metric-chip">
                                <strong>{completedMeals.length + (completedPreWorkout ? 1 : 0)}/{currentDayMeals.length + (currentPreWorkout ? 1 : 0)}</strong>
                                <span>وجبات</span>
                            </div>
                            <div className="metric-chip">
                                <strong>{currentDayData.energyLevel}/10</strong>
                                <span>الطاقة</span>
                            </div>
                        </div>
                    </div>

                    <ProgressBar progress={progress} />

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 sm:gap-6">
                        <div>
                            <h2 className="section-title">التمارين</h2>
                            {dayExercises.length > 0 ? (
                                dayExercises.map(exercise => (
                                    <ExerciseItem
                                        key={exercise.id}
                                        exercise={exercise}
                                        isCompleted={completedExercises.includes(exercise.id)}
                                        currentWeight={weightsData[exercise.id]?.current || ''}
                                        weightHistory={weightsData[exercise.id]?.history || []}
                                        onToggle={handleExerciseToggle}
                                        onWeightChange={handleWeightChange}
                                    />
                                ))
                            ) : (
                                <div className="card p-6 text-center muted-text">
                                    <i className="fas fa-bed text-3xl mb-3"></i>
                                    <p>يوم راحة - لا توجد تمارين</p>
                                </div>
                            )}

                            <h2 className="section-title mt-7">التغذية</h2>
                            {currentPreWorkout && (
                                <NutritionItem
                                    meal={{ id: 'pre-workout', name: currentPreWorkout.name }}
                                    isCompleted={completedPreWorkout}
                                    onToggle={handlePreWorkoutToggle}
                                />
                            )}

                            {currentDayMeals.map(meal => (
                                <NutritionItem
                                    key={meal.id}
                                    meal={meal}
                                    isCompleted={completedMeals.includes(meal.id)}
                                    onToggle={handleMealToggle}
                                />
                            ))}
                        </div>

                        <div>
                            <NutritionProgress
                                consumedProtein={consumedProtein}
                                consumedCarbs={consumedCarbs}
                                goals={currentGoals}
                            />

                            <DailyCheckIn
                                energyLevel={currentDayData.energyLevel}
                                ateAfterWorkout={currentDayData.ateAfterWorkout}
                                reachedProteinGoal={currentDayData.reachedProteinGoal}
                                notes={currentDayData.notes}
                                onUpdate={handleDailyUpdate}
                            />
                        </div>
                    </div>

                    <AnalyticsDashboard daysData={daysData} themeMode={themeMode} />
                    </>
                    )}

                    {currentPage === 'planner' && aiDialogOpen && (
                        <div className="ai-dialog-backdrop" onClick={() => setAiDialogOpen(false)}>
                            <div className="ai-dialog" onClick={(e) => e.stopPropagation()}>
                                <div className="planner-section-head mb-3">
                                    <div>
                                        <h4 className="planner-title"><i className="fas fa-comments"></i> Smart Questioner</h4>
                                        <p className="planner-subtitle">أجب على الأسئلة، ثم سنولد خطة ونعرضها لك للمراجعة قبل الاعتماد.</p>
                                    </div>
                                    <button className="secondary-btn px-3 py-2 text-sm" onClick={() => setAiDialogOpen(false)}>
                                        إغلاق
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                    <div>
                                        <label className="planner-grid-head block mb-1">ما هو جنسك؟</label>
                                        <select className="input-surface px-3 py-2 text-sm w-full" value={aiForm.sex} onChange={(e) => updateAiForm('sex', e.target.value)}>
                                            <option value="male">ذكر</option>
                                            <option value="female">أنثى</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="planner-grid-head block mb-1">وزنك الحالي (kg)</label>
                                        <input type="number" className="input-surface px-3 py-2 text-sm w-full" value={aiForm.weight} onChange={(e) => updateAiForm('weight', e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="planner-grid-head block mb-1">طولك (cm)</label>
                                        <input type="number" className="input-surface px-3 py-2 text-sm w-full" value={aiForm.height} onChange={(e) => updateAiForm('height', e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="planner-grid-head block mb-1">نسبة الدهون (%)</label>
                                        <input type="number" className="input-surface px-3 py-2 text-sm w-full" value={aiForm.bodyFat} onChange={(e) => updateAiForm('bodyFat', e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="planner-grid-head block mb-1">ما هو هدفك؟</label>
                                        <select className="input-surface px-3 py-2 text-sm w-full" value={aiForm.goal} onChange={(e) => updateAiForm('goal', e.target.value)}>
                                            <option value="muscle_gain">بناء عضل</option>
                                            <option value="fat_loss">خسارة دهون</option>
                                            <option value="maintain">ثبات</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="planner-grid-head block mb-1">مستواك التدريبي</label>
                                        <select className="input-surface px-3 py-2 text-sm w-full" value={aiForm.experience} onChange={(e) => updateAiForm('experience', e.target.value)}>
                                            <option value="beginner">مبتدئ</option>
                                            <option value="intermediate">متوسط</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="planner-grid-head block mb-1">كم يوم تتمرن بالأسبوع؟</label>
                                        <input type="number" min="3" max="7" className="input-surface px-3 py-2 text-sm w-full" value={aiForm.sessionsPerWeek} onChange={(e) => updateAiForm('sessionsPerWeek', e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="planner-grid-head block mb-1">نمط التغذية المفضل</label>
                                        <select className="input-surface px-3 py-2 text-sm w-full" value={aiForm.foodStyle} onChange={(e) => updateAiForm('foodStyle', e.target.value)}>
                                            <option value="balanced">Balanced</option>
                                            <option value="high_protein">High Protein</option>
                                            <option value="low_carb">Low Carb</option>
                                        </select>
                                    </div>
                                    <div className="sm:col-span-2">
                                        <label className="planner-grid-head block mb-1">أطعمة لا تريدها؟ (افصل بفاصلة)</label>
                                        <input className="input-surface px-3 py-2 text-sm w-full" value={aiForm.excludedFoods} onChange={(e) => updateAiForm('excludedFoods', e.target.value)} placeholder="مثال: تونة, لحم" />
                                    </div>
                                </div>

                                <div className="flex justify-end gap-2 mt-3">
                                    <button className="secondary-btn px-3 py-2 text-sm" onClick={() => setAiDialogOpen(false)}>
                                        إلغاء
                                    </button>
                                    <button className="primary-btn px-4 py-2 text-sm" disabled={aiIsGenerating} onClick={handleGenerateAiPlan}>
                                        <i className="fas fa-sparkles ml-1"></i>
                                        {aiIsGenerating ? 'جاري التوليد...' : 'توليد ومعاينة الخطة'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
