<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متتبع التمرين والتغذية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Epilogue:wght@500;700;800;900&family=Manrope:wght@400;600;700;800&display=swap');

        :root {
            --bg-primary: #101010;
            --bg-mid: #171717;
            --bg-end: #121212;
            --bg-glow-primary: rgba(242, 202, 80, 0.12);
            --bg-glow-secondary: rgba(229, 226, 225, 0.08);
            --border-card: #3b3730;
            --text-primary: #e9e3d7;
            --text-muted: #aba28e;
            --primary: #f2ca50;
            --primary-dark: #d4af37;
            --secondary: #d4af37;
            --card-bg-start: rgba(34, 33, 31, 0.94);
            --card-bg-end: rgba(26, 25, 24, 0.96);
            --primary-shadow: rgba(242, 202, 80, 0.26);
            --secondary-soft: rgba(242, 202, 80, 0.08);
            --secondary-soft-hover: rgba(242, 202, 80, 0.16);
            --secondary-border-soft: rgba(242, 202, 80, 0.28);
            --track-bg: #35322e;
            --badge-bg: rgba(242, 202, 80, 0.12);
            --badge-border: rgba(242, 202, 80, 0.26);
            --badge-text: #f5d984;
            --input-bg: #1a1a1a;
            --input-border: #4b453b;
            --day-tab-bg: rgba(39, 37, 34, 0.9);
            --day-tab-border: rgba(242, 202, 80, 0.2);
            --day-tab-active-gradient: linear-gradient(130deg, #f2ca50, #d4af37);
            --chip-bg: rgba(40, 38, 35, 0.92);
            --chip-border: #474238;
            --nav-bg: rgba(22, 21, 20, 0.95);
            --nav-border: #3c3830;
            --nav-shadow: 0 10px 30px rgba(0, 0, 0, 0.42);
            --nav-active-bg: rgba(242, 202, 80, 0.14);
            --nav-active-text: #ffe8a7;
            --chart-text: #e7dcc0;
            --chart-tick: #bcae8b;
            --chart-grid: #3f3a2f;
            --shadow-soft: 0 24px 50px rgba(0, 0, 0, 0.35);
        }

        body.theme-gym {
            --bg-primary: #0f141b;
            --bg-mid: #101a24;
            --bg-end: #0b1117;
            --bg-glow-primary: rgba(96, 159, 255, 0.14);
            --bg-glow-secondary: rgba(0, 197, 164, 0.1);
            --border-card: #28323d;
            --text-primary: #e9edf2;
            --text-muted: #97a6b5;
            --primary: #8cb5ff;
            --primary-dark: #5f8df2;
            --secondary: #00c5a4;
            --card-bg-start: rgba(22, 31, 43, 0.94);
            --card-bg-end: rgba(15, 22, 32, 0.96);
            --primary-shadow: rgba(96, 159, 255, 0.32);
            --secondary-soft: rgba(0, 197, 164, 0.14);
            --secondary-soft-hover: rgba(0, 197, 164, 0.22);
            --secondary-border-soft: rgba(0, 197, 164, 0.42);
            --track-bg: #233241;
            --badge-bg: rgba(242, 99, 37, 0.18);
            --badge-border: rgba(242, 99, 37, 0.35);
            --badge-text: #ffb799;
            --input-bg: #17212d;
            --input-border: #324152;
            --day-tab-bg: rgba(20, 30, 42, 0.84);
            --day-tab-border: rgba(96, 159, 255, 0.3);
            --day-tab-active-gradient: linear-gradient(130deg, #8cb5ff, #5f8df2);
            --chip-bg: rgba(20, 30, 42, 0.84);
            --chip-border: #334455;
            --nav-bg: rgba(15, 24, 34, 0.92);
            --nav-border: #2a3949;
            --nav-shadow: 0 10px 30px rgba(0, 0, 0, 0.42);
            --nav-active-bg: rgba(96, 159, 255, 0.2);
            --nav-active-text: #d7e5ff;
            --chart-text: #dbe4ee;
            --chart-tick: #9fb0c1;
            --chart-grid: #2c3b4a;
            --shadow-soft: 0 14px 34px rgba(0, 0, 0, 0.34);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-primary);
            font-family: 'Rubik', 'Manrope', sans-serif;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 10% 10%, var(--bg-glow-primary), transparent 28%),
                radial-gradient(circle at 85% 0%, var(--bg-glow-secondary), transparent 32%),
                linear-gradient(160deg, var(--bg-primary) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
        }

        h1, h2, h3 {
            font-family: 'Rubik', 'Manrope', sans-serif;
            letter-spacing: 0.01em;
        }

        .card {
            background: linear-gradient(165deg, var(--card-bg-start), var(--card-bg-end));
            border: 1px solid var(--border-card);
            border-radius: 1.4rem;
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            position: relative;
            transition: background 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
        }

        .topbar-card {
            background: linear-gradient(180deg, rgba(22, 22, 22, 0.9), rgba(16, 16, 16, 0.86));
            backdrop-filter: blur(12px);
            border-radius: 1.25rem;
            border-color: rgba(242, 202, 80, 0.12);
        }

        .app-topbar {
            position: sticky;
            top: 0.5rem;
            z-index: 30;
        }

        .hero-center {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            align-items: center;
            justify-content: center;
        }

        .hero-center .day-title {
            font-family: 'Epilogue', sans-serif;
            font-size: clamp(1.6rem, 3.8vw, 2.1rem);
            font-weight: 800;
            line-height: 1.15;
            margin: 0;
        }

        .hero-center .day-subtitle {
            margin: 0;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .hide-mobile {
            display: inline-flex;
        }

        .day-hero-card {
            border-radius: 1.6rem;
            border-color: rgba(242, 202, 80, 0.22);
        }

        .completed-surface {
            background:
                linear-gradient(0deg, rgba(242, 202, 80, 0.16), rgba(242, 202, 80, 0.16)),
                linear-gradient(165deg, var(--card-bg-start), var(--card-bg-end));
            box-shadow: var(--shadow-soft);
            transform: translateY(-1px);
        }

        .exercise-card,
        .meal-card {
            border: none;
            background: transparent;
            box-shadow: none;
            padding: 0 !important;
        }

        body.theme-gym .completed-surface {
            background:
                linear-gradient(0deg, rgba(96, 159, 255, 0.18), rgba(96, 159, 255, 0.18)),
                linear-gradient(165deg, var(--card-bg-start), var(--card-bg-end));
            box-shadow: var(--shadow-soft);
        }

        .text-primary {
            color: var(--primary);
        }

        .text-secondary {
            color: var(--secondary);
        }

        .border-primary {
            border-color: var(--primary);
        }

        .border-secondary {
            border-color: var(--secondary);
        }

        .bg-secondary {
            background-color: var(--secondary);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #241a00;
            font-weight: 700;
            border-radius: 0.95rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 8px 20px var(--primary-shadow);
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px var(--primary-shadow);
        }

        body.theme-gym .primary-btn {
            color: #eaf2ff;
        }

        .primary-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .secondary-btn {
            background-color: var(--secondary-soft);
            border: 1px solid var(--secondary-border-soft);
            color: var(--primary);
            font-weight: 700;
            border-radius: 0.95rem;
            transition: background-color 0.25s ease, transform 0.25s ease;
        }

        .secondary-btn:hover {
            background-color: var(--secondary-soft-hover);
            transform: translateY(-1px);
        }

        .icon-action-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .exercise-top {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            border-radius: 0.6rem;
            background: linear-gradient(130deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .exercise-controls {
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .exercise-toggle {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid rgba(242, 202, 80, 0.58);
            color: var(--primary);
            background: rgba(242, 202, 80, 0.12);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .exercise-toggle.completed,
        .exercise-play {
            background: var(--primary);
            color: #1f1807;
            border-color: transparent;
        }

        .exercise-play {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.98rem;
        }

        .exercise-machine {
            width: 56px;
            height: 56px;
            border-radius: 0.9rem;
            background: #0a0a0a;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .exercise-main {
            text-align: right;
            min-width: 0;
        }

        .exercise-main .name {
            font-size: 1.02rem;
            font-weight: 800;
            line-height: 1.35;
            margin: 0;
        }

        .exercise-main .meta {
            margin-top: 0.2rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            letter-spacing: 0.01em;
        }

        .meal-shell {
            padding: 0.8rem;
            border-radius: 0.6rem;
            background: linear-gradient(130deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meal-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.7rem;
        }

        .meal-check {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(242, 202, 80, 0.58);
            color: var(--primary);
            background: rgba(242, 202, 80, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .meal-check.done {
            background: var(--primary);
            color: #1f1807;
            border-color: transparent;
        }

        .meal-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: rgba(242, 202, 80, 0.75);
        }

        .macro-box {
            background: #090909;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0.45rem;
            padding: 0.55rem;
        }

        .macro-box .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
            font-size: 0.72rem;
        }

        .macro-box .row .label-protein {
            color: var(--primary);
            font-weight: 700;
        }

        .macro-box .row .label-carb {
            color: #c7c6c4;
            font-weight: 700;
        }

        .macro-box .row .pill {
            background: rgba(255, 255, 255, 0.12);
            padding: 0.12rem 0.34rem;
            border-radius: 0.35rem;
            font-size: 0.66rem;
            font-weight: 700;
        }

        .macro-box .food {
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .progress-bar {
            background-color: var(--track-bg);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            border-radius: 999px;
            transition: width 0.5s ease;
        }

        .badge {
            background-color: var(--badge-bg);
            border: 1px solid var(--badge-border);
            color: var(--badge-text);
            border-radius: 999px;
            padding: 0.2rem 0.65rem;
            font-size: 0.8rem;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .energy-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: var(--track-bg);
            outline: none;
        }

        .energy-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 0 2px rgba(47, 143, 116, 0.28);
        }

        .energy-slider::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 0 2px rgba(47, 143, 116, 0.28);
        }

        .weight-history {
            display: flex;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--track-bg);
            gap: 0.35rem;
            padding: 0.35rem 0;
            direction: rtl;
            justify-content: flex-start;
        }

        .weight-history::-webkit-scrollbar {
            height: 6px;
        }

        .weight-history::-webkit-scrollbar-track {
            background: var(--track-bg);
            border-radius: 3px;
        }

        .weight-history::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 3px;
        }

        .custom-checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--primary);
            border-radius: 0.5rem;
            background-color: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .custom-checkbox:checked {
            background-color: var(--primary);
        }

        .custom-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .day-tab {
            border-radius: 1rem;
            border: 1px solid var(--day-tab-border);
            background: var(--day-tab-bg);
            min-width: 108px;
            transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .day-tab.active {
            background: var(--day-tab-active-gradient);
            color: #231900;
            border-color: transparent;
            box-shadow: 0 12px 22px var(--primary-shadow);
        }

        .day-tab.completed::after {
            content: '✓';
            margin-right: 0.35rem;
            color: var(--secondary);
            font-weight: 800;
        }

        .page-shell {
            width: min(1120px, 100% - 1rem);
            margin: 0 auto;
            padding: 1rem 0 1.6rem;
        }

        .section-title {
            font-size: 1.08rem;
            font-weight: 800;
            margin-bottom: 0.85rem;
        }

        .input-surface {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 0.35rem;
        }

        .muted-text {
            color: var(--text-muted);
        }

        .planner-root {
            display: grid;
            gap: 1.1rem;
        }

        .planner-shell {
            border: 1px solid rgba(242, 202, 80, 0.16);
            background:
                radial-gradient(circle at 100% 0%, rgba(242, 202, 80, 0.08), transparent 34%),
                linear-gradient(165deg, rgba(25, 23, 20, 0.96), rgba(15, 15, 15, 0.98));
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.38);
        }

        .planner-hero {
            padding: 0.9rem;
            border-radius: 0.9rem;
            border: 1px solid rgba(242, 202, 80, 0.18);
            background: linear-gradient(135deg, rgba(242, 202, 80, 0.1), rgba(242, 202, 80, 0.02));
        }

        .planner-panel {
            position: relative;
            overflow: hidden;
            border-radius: 0.95rem;
            border: 1px solid rgba(242, 202, 80, 0.12);
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.025), rgba(0, 0, 0, 0.2));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .planner-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(242, 202, 80, 0.24), transparent);
            pointer-events: none;
        }

        .planner-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .planner-title {
            font-size: 1.02rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .planner-subtitle {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 0.16rem;
        }

        .planner-row {
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(6, 6, 6, 0.34);
            border-radius: 0.7rem;
            padding: 0.55rem;
        }

        .planner-grid-head {
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .ai-dialog-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem;
        }

        .ai-dialog {
            width: min(760px, 100%);
            max-height: 88vh;
            overflow: auto;
            border-radius: 0.95rem;
            border: 1px solid rgba(242, 202, 80, 0.18);
            background: linear-gradient(160deg, rgba(24, 24, 24, 0.98), rgba(12, 12, 12, 0.98));
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            padding: 1rem;
        }

        .planner-root .input-surface {
            min-height: 40px;
            border-radius: 0.6rem;
            background: rgba(16, 25, 40, 0.62);
            border-color: rgba(122, 147, 182, 0.35);
            color: #e8edf5;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .planner-root .input-surface:focus {
            outline: none;
            border-color: rgba(242, 202, 80, 0.68);
            box-shadow: 0 0 0 2px rgba(242, 202, 80, 0.16);
        }

        .planner-root .secondary-btn {
            border-radius: 0.65rem;
        }

        .app-frame {
            display: grid;
            gap: 1rem;
        }

        .app-frame > * {
            min-width: 0;
        }

        .day-tabs-row {
            scrollbar-width: none;
        }

        .day-tabs-row::-webkit-scrollbar {
            display: none;
        }

        .hero-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.65rem;
        }

        .metric-chip {
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 0.85rem;
            padding: 0.55rem 0.65rem;
            text-align: center;
        }

        .metric-chip strong {
            display: block;
            font-size: 0.9rem;
            font-weight: 800;
        }

        .metric-chip span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .brand-logo {
            width: 220px;
            max-width: 100%;
            height: 54px;
            border-radius: 14px;
            border: 1px solid var(--border-card);
            background: linear-gradient(120deg, rgba(242, 202, 80, 0.18), rgba(65, 61, 49, 0.55));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            box-shadow: var(--shadow-soft);
        }

        body.theme-gym .brand-logo {
            background: linear-gradient(120deg, rgba(96, 159, 255, 0.22), rgba(0, 197, 164, 0.16));
        }

        .brand-logo-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-size: 0.8rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo-text {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .page-shell {
                width: min(1120px, calc(100% - 0.7rem));
                padding-top: 0.7rem;
                padding-bottom: 1.2rem;
            }

            .card {
                border-radius: 1rem;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            }

            .primary-btn,
            .secondary-btn {
                min-height: 44px;
            }

            .icon-action-btn {
                width: 42px;
                height: 42px;
                min-height: 42px;
            }

            .section-title {
                font-size: 1rem;
                margin-bottom: 0.65rem;
            }

            .day-tab {

        function cloneDeep(value) {
            return JSON.parse(JSON.stringify(value));
        }

        function readStorageJson(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return fallback;
                const parsed = JSON.parse(raw);

                if (Array.isArray(fallback)) {
                    return Array.isArray(parsed) ? parsed : fallback;
                }

                if (fallback && typeof fallback === 'object') {
                    return (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) ? parsed : fallback;
                }

                return parsed ?? fallback;
            } catch (error) {
                return fallback;
            }
        }

        function useDebouncedStorage(key, value, delay = 250) {
            useEffect(() => {
                const timer = setTimeout(() => {
                    localStorage.setItem(key, JSON.stringify(value));
                }, delay);

                return () => clearTimeout(timer);
            }, [key, value, delay]);
        }

        function toSafeInt(value, fallback = 0, min = 0, max = 9999) {
            const parsed = parseInt(value, 10);
            if (!Number.isFinite(parsed)) return fallback;
            return Math.max(min, Math.min(max, parsed));
        }

        function getDefaultDayPlan(dayId) {
            const day = WEEK_DAYS[dayId];
            const nutrition = DAY_NUTRITION_PLANS[dayId] || { preWorkout: null, goals: { protein: 150, carbs: 150 }, meals: [] };

            return {
                dayId,
                exercises: day.exercises.map((exerciseId) => {
                    const source = EXERCISES.find((item) => item.id === exerciseId);
                    return {
                        id: source.id,
                        name: source.name,
                        sets: source.sets,
                        reps: source.reps,
                        videoUrl: source.videoUrl
                    };
                }),
                nutrition: {
                    preWorkout: nutrition.preWorkout ? cloneDeep(nutrition.preWorkout) : null,
                    goals: cloneDeep(nutrition.goals),
                    meals: nutrition.meals.map((meal) => ({ id: meal.id, name: meal.name }))
                }
            };
        }

        function normalizeDayPlan(dayId, plan) {
            const fallback = getDefaultDayPlan(dayId);
            if (!plan || typeof plan !== 'object') return fallback;

            const exercises = Array.isArray(plan.exercises)
                ? plan.exercises.filter(Boolean).map((exercise, idx) => ({
                    id: exercise.id ?? `ex-${dayId}-${idx}`,
                    name: exercise.name || `تمرين ${idx + 1}`,
                    sets: Number.isFinite(Number(exercise.sets)) ? Number(exercise.sets) : 3,
                    reps: exercise.reps || '10-12',
                    videoUrl: exercise.videoUrl || ''
                }))
                : fallback.exercises;

            const nutrition = plan.nutrition || {};
            const meals = Array.isArray(nutrition.meals)
                ? nutrition.meals.filter(Boolean).map((meal, idx) => ({
                    id: meal.id ?? `meal-${dayId}-${idx}`,
                    name: meal.name || `وجبة ${idx + 1}: عنصر: 20g بروتين، 20g كارب`
                }))
                : fallback.nutrition.meals;

            return {
                dayId,
                exercises,
                nutrition: {
                    preWorkout: nutrition.preWorkout && nutrition.preWorkout.name
                        ? { name: nutrition.preWorkout.name }
                        : null,
                    goals: {
                        protein: Number.isFinite(Number(nutrition.goals?.protein)) ? Number(nutrition.goals.protein) : fallback.nutrition.goals.protein,
                        carbs: Number.isFinite(Number(nutrition.goals?.carbs)) ? Number(nutrition.goals.carbs) : fallback.nutrition.goals.carbs
                    },
                    meals
                }
            };
        }

        function extractMealMacros(mealName) {
            let protein = 0;
            let carbs = 0;

            const proteinMatches = mealName.match(/(\d+)g\s*بروتين/g) || [];
            const carbsMatches = mealName.match(/(\d+)g\s*كارب/g) || [];

            proteinMatches.forEach((chunk) => {
                const match = chunk.match(/(\d+)g/);
                if (match) protein += parseInt(match[1], 10);
            });

            carbsMatches.forEach((chunk) => {
                const match = chunk.match(/(\d+)g/);
                if (match) carbs += parseInt(match[1], 10);
            });

            return { protein, carbs };
        }

        function splitFoodAndWeight(text) {
            const normalized = text.trim();
            const bracketWeightMatch = normalized.match(/\(([^)]*g)\)\s*$/);
            if (bracketWeightMatch) {
                return {
                    food: normalized.slice(0, bracketWeightMatch.index).trim(),
                    weight: bracketWeightMatch[1].trim()
                };
            }

            const trailingWeightMatch = normalized.match(/^(.*)\s(\d+(?:\.\d+)?g)$/);
            if (trailingWeightMatch) {
                return {
                    food: trailingWeightMatch[1].trim(),
                    weight: trailingWeightMatch[2].trim()
                };
            }

            return { food: normalized, weight: '-' };
        }

        function parseMealEntries(mealText) {
            const parts = mealText.split(':');
            const mealName = parts[0].trim();
            const details = parts.slice(1).join(':');
            const entries = details
                .split('+')
                .map(entry => entry.trim())
                .filter(Boolean)
                .map((entry) => {
                    const match = entry.match(/^(.*?):\s*(\d+)g بروتين،\s*(\d+)g كارب$/);
                    if (!match) return null;

                    const { food, weight } = splitFoodAndWeight(match[1]);
                    return {
                        food,
                        weight,
                        protein: parseInt(match[2], 10),
                        carbs: parseInt(match[3], 10)
                    };
                })
                .filter(Boolean);

            return { mealName, entries };
        }

        function parseMealForEditor(mealText) {
            const parsed = parseMealEntries(mealText);
            const title = parsed.mealName || 'وجبة';
            const entries = parsed.entries.length > 0
                ? parsed.entries.map((entry) => ({
                    food: entry.food || '',
                    weight: entry.weight && entry.weight !== '-' ? entry.weight : '',
                    protein: Number.isFinite(Number(entry.protein)) ? Number(entry.protein) : 0,
                    carbs: Number.isFinite(Number(entry.carbs)) ? Number(entry.carbs) : 0
                }))
                : [{ food: '', weight: '', protein: 0, carbs: 0 }];

            return { title, entries };
        }

        function buildMealNameFromEditor(model) {
            const title = (model.title || 'وجبة').trim();
            const validEntries = (model.entries || []).filter((entry) => {
                return entry.food && entry.food.trim().length > 0;
            });

            const entries = (validEntries.length > 0 ? validEntries : [{ food: 'عنصر', weight: '100g', protein: 20, carbs: 20 }])
                .map((entry) => {
                    const cleanFood = entry.food.trim();
                    const cleanWeight = (entry.weight || '').trim();
                    const protein = Number.isFinite(Number(entry.protein)) ? Number(entry.protein) : 0;
                    const carbs = Number.isFinite(Number(entry.carbs)) ? Number(entry.carbs) : 0;
                    const foodWithWeight = cleanWeight ? `${cleanFood} ${cleanWeight}` : cleanFood;
                    return `${foodWithWeight}: ${protein}g بروتين، ${carbs}g كارب`;
                });

            return `${title}: ${entries.join(' + ')}`;
        }

                const entry = {
                    id: `m-${Date.now()}`,
                    date: metricsForm.date,
                    weight: Number(metricsForm.weight) || 0,
                    bodyFat: Number(metricsForm.bodyFat) || 0,
                    waist: Number(metricsForm.waist) || 0,
                    chest: Number(metricsForm.chest) || 0,
                    arm: Number(metricsForm.arm) || 0,
                    thigh: Number(metricsForm.thigh) || 0
                };

                setMetricsEntries(prev => [...prev.filter(item => item.date !== entry.date), entry]);
            };

            const handleDeleteMetricsEntry = (id) => {
                setMetricsEntries(prev => prev.filter(item => item.id !== id));
            };

            const roundTo = (num, step = 5) => Math.max(step, Math.round(num / step) * step);

            const buildMealString = (title, items) => {
                return `${title}: ${items.map(item => `${item.food} ${item.weight}g: ${item.protein}g بروتين، ${item.carbs}g كارب`).join(' + ')}`;
            };

            const createProteinItem = (food, protein, carbs = 0) => {
                const density = {
                    'دجاج': 0.30,
                    'لحم': 0.26,
                    'تونة': 0.25,
                    'بيض': 0.12,
                    'واي بروتين': 0.8,
                    'زبادي': 0.1
                };
                const safeProtein = Math.max(0, Math.round(protein));
                const grams = roundTo(safeProtein / (density[food] || 0.25));
                return { food, weight: grams, protein: safeProtein, carbs: Math.max(0, Math.round(carbs)) };
            };

            const createCarbItem = (food, carbs, protein = 0) => {
                const density = {
                    'رز': 0.28,
                    'موز': 0.23,
                    'خبز': 0.5,
                    'شوفان': 0.66,
                    'فاكهة': 0.16
                };
                const safeCarbs = Math.max(0, Math.round(carbs));
                const grams = roundTo(safeCarbs / (density[food] || 0.28));
                return { food, weight: grams, protein: Math.max(0, Math.round(protein)), carbs: safeCarbs };
            };

            const getGoalMacroProfile = (goal) => {
                if (goal === 'fat_loss') return { proteinPerKg: 2.2, carbsPerKg: 1.9, label: 'خسارة دهون' };
                if (goal === 'maintain') return { proteinPerKg: 1.9, carbsPerKg: 2.8, label: 'ثبات' };
                return { proteinPerKg: 2.0, carbsPerKg: 3.7, label: 'بناء عضل' };
            };

            const getExperienceLabel = (level) => {
                if (level === 'intermediate') return 'متوسط';
                return 'مبتدئ';
            };

            const getCarbMultiplierByDay = (dayType) => {
                if (dayType.includes('Legs')) return 1.2;
                if (dayType.includes('Push') || dayType.includes('Pull')) return 1;
                if (dayType.includes('Upper')) return 0.9;
                if (dayType.includes('Light Activity')) return 0.75;
                return 0.62;
            };

            const isCompoundExercise = (name) => {
                return /(Bench|Press|Squat|Row|Deadlift|Pull-ups|Pulldown)/i.test(name || '');
            };

            const createSeededRandom = (seedInput) => {
                let seed = seedInput % 2147483647;
                if (seed <= 0) seed += 2147483646;
                return () => {
                    seed = seed * 16807 % 2147483647;
                    return (seed - 1) / 2147483646;
                };
            };

            const pickFromPool = (pool, count, randomFn) => {
                const source = [...pool];
                const picked = [];
                while (source.length > 0 && picked.length < count) {
                    const idx = Math.floor(randomFn() * source.length);
                    picked.push(source.splice(idx, 1)[0]);
                }
                return picked;
            };

            const parseExcludedFoods = (text) => {
                return (text || '')
                    .split(',')
                    .map((item) => item.trim().toLowerCase())
                    .filter(Boolean);
            };

            const isExcluded = (food, excludedList) => {
                const normalized = String(food || '').toLowerCase();
                return excludedList.some((item) => normalized.includes(item));
            };

            const exerciseLibraryMap = useMemo(() => {
                const map = new Map();
                BASIC_GYM_EXERCISES.forEach((exercise) => {
                    map.set(exercise.name, exercise);
                });
                return map;
            }, []);

            const groupedExerciseOptions = useMemo(() => {
                const order = ['Push', 'Pull', 'Legs', 'Core', 'Cardio'];
                const grouped = new Map();

                order.forEach((category) => grouped.set(category, []));
                BASIC_GYM_EXERCISES.forEach((exercise) => {
                    const category = exercise.category || 'Other';
                    if (!grouped.has(category)) grouped.set(category, []);
                    grouped.get(category).push(exercise);
                });

                return [...grouped.entries()]
                    .map(([category, items]) => ({ category, items }))
                    .filter((group) => group.items.length > 0);
            }, []);

            const generateExercisesByGoal = (dayId, goal, experience, randomFn) => {
                const day = WEEK_DAYS[dayId];
                const type = day.type;
                const presets = goal === 'fat_loss'
                    ? { compoundSets: 4, compoundReps: '8-12', accessorySets: 3, accessoryReps: '12-15' }
                    : goal === 'maintain'
                        ? { compoundSets: 4, compoundReps: '6-10', accessorySets: 3, accessoryReps: '10-12' }
                        : { compoundSets: 5, compoundReps: '5-8', accessorySets: 4, accessoryReps: '8-12' };

                const levelCap = experience === 'intermediate' ? 6 : 4;
                let targetCategory = 'Push';
                if (type.includes('Pull')) targetCategory = 'Pull';
                else if (type.includes('Legs')) targetCategory = 'Legs';
                else if (type.includes('Upper')) targetCategory = 'Upper';
                else if (type.includes('Light Activity')) targetCategory = 'Light';
                else if (type.includes('Rest')) targetCategory = 'Rest';

                if (targetCategory === 'Rest') return [];

                let candidates = [];
                if (targetCategory === 'Upper') {
                    candidates = BASIC_GYM_EXERCISES.filter((exercise) => exercise.category === 'Push' || exercise.category === 'Pull');
                } else if (targetCategory === 'Light') {
                    candidates = BASIC_GYM_EXERCISES.filter((exercise) => exercise.category === 'Cardio' || exercise.category === 'Core');
                } else {
                    candidates = BASIC_GYM_EXERCISES.filter((exercise) => exercise.category === targetCategory);
                }

                if (candidates.length === 0) return getDefaultDayPlan(dayId).exercises;

                const desiredCount = Math.min(candidates.length, experience === 'intermediate' ? 6 : 5);
                const selected = pickFromPool(candidates, Math.max(3, desiredCount), randomFn);

                return selected.slice(0, levelCap).map((exercise, index) => {
                    const compound = isCompoundExercise(exercise.name);
                    const isLight = targetCategory === 'Light';
                    return {
                        id: createEditorId(`gen-${dayId}-${index}`),
                        name: exercise.name,
                        sets: isLight ? 3 : (compound ? presets.compoundSets : presets.accessorySets),
                        reps: isLight ? (exercise.reps || '12-20') : (compound ? presets.compoundReps : presets.accessoryReps),
                        videoUrl: ''
                    };
                });
            };

            const generateNutritionByGoal = (dayId, form, randomFn) => {
                const day = WEEK_DAYS[dayId];
                const profile = getGoalMacroProfile(form.goal);
                const weight = Math.max(35, Number(form.weight) || 75);
                const height = Math.max(140, Number(form.height) || 170);
                const bodyFat = Math.min(55, Math.max(6, Number(form.bodyFat) || 20));
                const leanMass = weight * (1 - bodyFat / 100);
                const bmr = form.sex === 'female'
                    ? Math.round((10 * weight) + (6.25 * height) - (5 * 28) - 161)
                    : Math.round((10 * weight) + (6.25 * height) - (5 * 28) + 5);
                const maintenance = Math.round(Math.max(bmr * 1.3, (370 + (21.6 * leanMass)) * 1.35));
                const adjustedCalories = form.goal === 'fat_loss'
                    ? maintenance - 350
                    : form.goal === 'maintain'
                        ? maintenance
                        : maintenance + 280;

                const proteinGoal = Math.round(weight * profile.proteinPerKg * (day.type.includes('Rest') ? 0.95 : 1));
                const fatGoal = Math.round(Math.max(45, weight * (form.goal === 'fat_loss' ? 0.7 : 0.8)));
                const carbFromCalories = Math.round(Math.max(80, (adjustedCalories - (proteinGoal * 4) - (fatGoal * 9)) / 4));
                const carbsGoal = Math.round(Math.max(80, carbFromCalories * getCarbMultiplierByDay(day.type)));
                const hasWorkout = !day.type.includes('Rest');

                const excludedFoods = parseExcludedFoods(form.excludedFoods);

                const proteinFoods = ['دجاج', 'لحم', 'تونة', 'بيض', 'زبادي', 'واي بروتين'];
                const carbFoods = ['رز', 'خبز', 'شوفان', 'موز', 'فاكهة'];

                const filteredProteinFoods = proteinFoods.filter((food) => !isExcluded(food, excludedFoods));
                const filteredCarbFoods = carbFoods.filter((food) => !isExcluded(food, excludedFoods));

                const proteinPool = filteredProteinFoods.length > 0 ? filteredProteinFoods : proteinFoods;
                const carbPool = filteredCarbFoods.length > 0 ? filteredCarbFoods : carbFoods;

                const pickProtein = () => proteinPool[Math.floor(randomFn() * proteinPool.length)];
                const pickCarb = () => carbPool[Math.floor(randomFn() * carbPool.length)];

                let preWorkout = null;
                const meals = [];

                const p1 = Math.round(proteinGoal * (hasWorkout ? 0.36 : 0.34));
                const p2 = Math.round(proteinGoal * (hasWorkout ? 0.34 : 0.33));
                const p3 = Math.max(0, proteinGoal - p1 - p2);

                const cPre = hasWorkout ? Math.round(carbsGoal * 0.2) : 0;
                const c1 = Math.round(carbsGoal * (hasWorkout ? 0.4 : 0.38));
                const c2 = Math.round(carbsGoal * (hasWorkout ? 0.26 : 0.32));
                const c3 = Math.max(0, carbsGoal - cPre - c1 - c2);

                const foodStyleFactor = form.foodStyle === 'low_carb' ? 0.82 : form.foodStyle === 'high_protein' ? 0.92 : 1;

                if (hasWorkout) {
                    preWorkout = {
                        name: buildMealString('قبل التمرين', [
                            createCarbItem(pickCarb(), Math.round(cPre * 0.55 * foodStyleFactor), 0),
                            createProteinItem(pickProtein(), Math.round(p3 * 0.45), Math.round(cPre * 0.45 * foodStyleFactor))
                        ])
                    };
                }

                meals.push({
                    id: 0,
                    name: buildMealString(hasWorkout ? 'بعد التمرين' : 'وجبة 1', [
                        createProteinItem(pickProtein(), p1, 0),
                        createCarbItem(pickCarb(), Math.round(c1 * foodStyleFactor), 0)
                    ])
                });

                meals.push({
                    id: 1,
                    name: buildMealString('وجبة 2', [
                        createProteinItem(pickProtein(), p2, 0),
                        createCarbItem(pickCarb(), Math.round(c2 * foodStyleFactor), 0)
                    ])
                });

                meals.push({
                    id: 2,
                    name: buildMealString('وجبة 3', [
                        createProteinItem(pickProtein(), Math.round(p3 * 0.6), 0),
                        createCarbItem(pickCarb(), Math.round(c3 * foodStyleFactor), Math.round(p3 * 0.4))
                    ])
                });

                return {
                    preWorkout,
                    goals: { protein: proteinGoal, carbs: carbsGoal },
                    meals
                };
            };

            const buildLocalGeneratedPlan = (form) => {
                const sessions = toSafeInt(form.sessionsPerWeek, 5, 3, 7);
                const seed = Date.now();
                const randomFn = createSeededRandom(seed);
                const generated = {};

                WEEK_DAYS.forEach((day) => {
                    generated[day.id] = {
                        dayId: day.id,
                        exercises: generateExercisesByGoal(day.id, form.goal, form.experience, randomFn),
                        nutrition: generateNutritionByGoal(day.id, form, randomFn)
                    };
                });

                const activeDayIds = WEEK_DAYS.filter((d) => !d.type.includes('Rest')).map((d) => d.id);
                const reducedDays = activeDayIds.slice(sessions);
                reducedDays.forEach((dayId) => {
                    generated[dayId].exercises = [];
                });

                const avgProtein = Math.round(Object.values(generated).reduce((sum, day) => sum + day.nutrition.goals.protein, 0) / WEEK_DAYS.length);
                const avgCarbs = Math.round(Object.values(generated).reduce((sum, day) => sum + day.nutrition.goals.carbs, 0) / WEEK_DAYS.length);
                const goalLabel = getGoalMacroProfile(form.goal).label;
                const experienceLabel = getExperienceLabel(form.experience);
                const summary = `تم إنشاء خطة تلقائية لهدف ${goalLabel} بمستوى ${experienceLabel} وعدد ${sessions} أيام تدريب أسبوعيًا، بمتوسط ${avgProtein}g بروتين و${avgCarbs}g كارب يوميًا.`;

                return { generated, summary };
            };

            const normalizeGeneratedPlan = (generated) => {
                const safe = {};
                WEEK_DAYS.forEach((day) => {
                    safe[day.id] = normalizeDayPlan(day.id, generated?.[day.id] || null);
                });
                return safe;
            };

            const tryGenerateGeminiPlan = async (form) => {
                try {
                    const response = await fetch('/api/gemini-plan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            profile: form,
                            weekDays: WEEK_DAYS,
                            exercisePool: BASIC_GYM_EXERCISES,
                            instructions: 'Return weekly plan in compatible schema: generated{0..6}, each day has dayId, exercises[], nutrition{preWorkout,goals,meals}. Keep meal name format exactly compatible.'
                        })
                    });

                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(text || 'gemini endpoint unavailable');
                    }
                    const payload = await response.json();
                    const generated = normalizeGeneratedPlan(payload?.generated || payload);
                    const summary = payload?.summary || 'تم إنشاء الخطة عبر Gemini.';
                    return { generated, summary, source: 'gemini' };
                } catch (error) {
                    throw error;
                }
            };

            const handleGenerateAiPlan = async () => {
                const weight = Number(aiForm.weight);
                const height = Number(aiForm.height);
                const bodyFat = Number(aiForm.bodyFat);

                if (!weight || !height || !bodyFat) {
                    alert('يرجى تعبئة بيانات الطول والوزن ونسبة الدهون أولاً.');
                    return;
                }

                setAiIsGenerating(true);
                try {
                    const finalResult = await tryGenerateGeminiPlan(aiForm);
                    setAiDraftPlan(finalResult.generated);
                    setAiSummary(finalResult.summary);
                    setAiDialogOpen(false);
                } catch (error) {
                    alert('تعذر توليد الخطة من Gemini. تأكد من إعداد endpoint ومفتاح API ثم حاول مرة أخرى.');
                } finally {
                    setAiIsGenerating(false);
                }
            };

            const handleApplyAiDraft = () => {
                if (!aiDraftPlan) return;
                setCustomPlans(aiDraftPlan);
                setEditorDay(0);
                setAiDraftPlan(null);
            };
            
            const currentDayData = {
                ...DAY_DEFAULT_DATA,
                ...(daysData[currentDay] || {})
            };

            const getDayPlan = useCallback((dayId) => {
                return normalizeDayPlan(dayId, customPlans[dayId] ? cloneDeep(customPlans[dayId]) : null);
            }, [customPlans]);

            useEffect(() => {
                setDaysData(prev => {
                    let changed = false;
                    const next = { ...prev };

                    Object.keys(prev).forEach((dayKey) => {
                        const dayId = Number(dayKey);
                        if (!Number.isFinite(dayId) || !WEEK_DAYS[dayId]) return;

                        const plan = getDayPlan(dayId);
                        const validExerciseIds = new Set((plan.exercises || []).map((exercise) => exercise.id));
                        const validMealIds = new Set((plan.nutrition?.meals || []).map((meal) => meal.id));

                        const rawDayData = { ...DAY_DEFAULT_DATA, ...(prev[dayKey] || {}) };
                        const cleanedExercises = (rawDayData.completedExercises || []).filter((id) => validExerciseIds.has(id));
                        const cleanedMeals = (rawDayData.completedMeals || []).filter((id) => validMealIds.has(id));
                        const cleanedPreWorkout = !!plan.nutrition?.preWorkout && !!rawDayData.completedPreWorkout;

                        if (
                            cleanedExercises.length !== (rawDayData.completedExercises || []).length ||
                            cleanedMeals.length !== (rawDayData.completedMeals || []).length ||
                            cleanedPreWorkout !== !!rawDayData.completedPreWorkout
                        ) {
                            changed = true;
                            next[dayKey] = {
                                ...rawDayData,
                                completedExercises: cleanedExercises,
                                completedMeals: cleanedMeals,
                                completedPreWorkout: cleanedPreWorkout
                            };
                        }
                    });

                    return changed ? next : prev;
                });
            }, [getDayPlan]);

            const currentDayPlan = useMemo(() => getDayPlan(currentDay), [getDayPlan, currentDay]);
            const currentNutritionPlan = currentDayPlan.nutrition;
            const currentDayMeals = currentNutritionPlan.meals;
            const currentPreWorkout = currentNutritionPlan.preWorkout;
            const currentGoals = currentNutritionPlan.goals;

            const dayExercises = currentDayPlan.exercises;
            const validExerciseIds = useMemo(() => new Set(dayExercises.map((exercise) => exercise.id)), [dayExercises]);
            const validMealIds = useMemo(() => new Set(currentDayMeals.map((meal) => meal.id)), [currentDayMeals]);
            const mealsById = useMemo(() => new Map(currentDayMeals.map((meal) => [meal.id, meal])), [currentDayMeals]);

            const completedExercises = (currentDayData.completedExercises || []).filter((id) => validExerciseIds.has(id));
            const completedMeals = (currentDayData.completedMeals || []).filter((id) => validMealIds.has(id));
            const completedPreWorkout = !!currentDayData.completedPreWorkout;
            
            // حساب تقدم اليوم
            const totalTasks = dayExercises.length + currentDayMeals.length + (currentPreWorkout ? 1 : 0) + 2;
            const completedTasks = completedExercises.length + completedMeals.length +
                (completedPreWorkout ? 1 : 0) +
                (currentDayData.ateAfterWorkout ? 1 : 0) + (currentDayData.reachedProteinGoal ? 1 : 0);
            const progress = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            // حساب الماكروز المستهلكة
            const calculateMacros = useCallback((selectedMeals = completedMeals, includePreWorkout = completedPreWorkout) => {
                let protein = 0;
                let carbs = 0;

                const mealIds = Array.isArray(selectedMeals)
                    ? selectedMeals.filter((mealId) => mealsById.has(mealId))
                    : [];
                
                mealIds.forEach(mealId => {
                    const meal = mealsById.get(mealId);
                    if (meal) {
                        const mealMacros = extractMealMacros(meal.name);
                        protein += mealMacros.protein;
                        carbs += mealMacros.carbs;
                    }
                });

                if (includePreWorkout && currentPreWorkout) {
                    const preWorkoutMacros = extractMealMacros(currentPreWorkout.name);
                    protein += preWorkoutMacros.protein;
                    carbs += preWorkoutMacros.carbs;
                }
                
                return { protein, carbs };
            }, [completedMeals, completedPreWorkout, currentPreWorkout, mealsById]);
            
            const { protein: consumedProtein, carbs: consumedCarbs } = calculateMacros();
            
            const handleExerciseToggle = (exerciseId) => {
                setDaysData(prev => {
                    const dayData = {
                        ...DAY_DEFAULT_DATA,
                        ...(prev[currentDay] || {})
                    };
                    const safeCompletedExercises = (dayData.completedExercises || []).filter((id) => validExerciseIds.has(id));
                    const newCompletedExercises = safeCompletedExercises.includes(exerciseId)
                        ? safeCompletedExercises.filter(id => id !== exerciseId)
                        : [...safeCompletedExercises, exerciseId];
                    
                    return {
                        ...prev,
                        [currentDay]: {
                            ...dayData,
                            completedExercises: newCompletedExercises
                        }
                    };
                });
            };
            
            const handleMealToggle = (mealId) => {
                setDaysData(prev => {
                    const dayData = {
                        ...DAY_DEFAULT_DATA,
                        ...(prev[currentDay] || {})
                    };
                    const safeCompletedMeals = (dayData.completedMeals || []).filter((id) => validMealIds.has(id));
                    const newCompletedMeals = safeCompletedMeals.includes(mealId)
                        ? safeCompletedMeals.filter(id => id !== mealId)
                        : [...safeCompletedMeals, mealId];

                    const { protein, carbs } = calculateMacros(newCompletedMeals, dayData.completedPreWorkout);
                    
                    return {
                        ...prev,
                        [currentDay]: {
                            ...dayData,
                            completedMeals: newCompletedMeals,
                            consumedProtein: protein,
                            consumedCarbs: carbs
                        }
                    };
                });
            };

            const handlePreWorkoutToggle = () => {
                setDaysData(prev => {
                    const dayData = {
                        ...DAY_DEFAULT_DATA,
                        ...(prev[currentDay] || {})
                    };

                    const newCompletedPreWorkout = !dayData.completedPreWorkout;
                    const safeCompletedMeals = (dayData.completedMeals || []).filter((id) => validMealIds.has(id));
                    const { protein, carbs } = calculateMacros(safeCompletedMeals, newCompletedPreWorkout);

                    return {
                        ...prev,
                        [currentDay]: {
                            ...dayData,
                            completedPreWorkout: newCompletedPreWorkout,
                            consumedProtein: protein,
                            consumedCarbs: carbs
                        }
                    };
                });
            };
            
            const handleWeightChange = (exerciseId, weight) => {
                setWeightsData(prev => {
                    const current = prev[exerciseId] || { current: '', history: [] };
                    return {
                        ...prev,
                        [exerciseId]: {
                            ...current,
                            current: weight
                        }
                    };
                });
            };
            
            const handleDailyUpdate = (field, value) => {
                setDaysData(prev => {
                    const dayData = {
                        ...DAY_DEFAULT_DATA,
                        ...(prev[currentDay] || {})
                    };
                    return {
                        ...prev,
                        [currentDay]: {
                            ...dayData,
                            [field]: value
                        }
                    };
                });
            };
            
            const handleCompleteDay = () => {
                setDaysData(prev => {
                    const dayData = {
                        ...DAY_DEFAULT_DATA,
                        ...(prev[currentDay] || {})
                    };
                    return {
                        ...prev,
                        [currentDay]: {
                            ...dayData,
                            completed: true,
                            consumedProtein,
                            consumedCarbs
                        }
                    };
                });
                
                // تحديث سجل الأوزان
                setWeightsData(prev => {
                    const newWeights = { ...prev };
                    dayExercises.forEach(exercise => {
                        const weightData = newWeights[exercise.id] || { current: '', history: [] };
                        if (weightData.current) {
                            const newHistory = [weightData.current, ...weightData.history].slice(0, 3);
                            newWeights[exercise.id] = {
                                current: weightData.current,
                                history: newHistory
                            };
                        }
                    });
                    return newWeights;
                });
                
                alert('تم إتمام اليوم بنجاح! تم تحديث سجل الأوزان.');
            };
            
            const handleResetWeek = () => {
                if (confirm('هل أنت متأكد من إعادة تعيين الأسبوع؟ سيتم مسح جميع الإنجازات ولكن سيتم حفظ الأوزان الحالية في السجل.')) {
                    // حفظ الأوزان الحالية في السجل قبل المسح
                    const newWeightsData = { ...weightsData };
                    Object.keys(newWeightsData).forEach(exerciseId => {
                        const weightData = newWeightsData[exerciseId];
                        if (weightData.current) {
                            const newHistory = [weightData.current, ...weightData.history].slice(0, 3);
                            newWeightsData[exerciseId] = {
                                current: '',
                                history: newHistory
                            };
                        }
                    });
                    
                    setWeightsData(newWeightsData);
                    setDaysData({});
                    
                    alert('تم إعادة تعيين الأسبوع بنجاح! تم أرشفة الأوزان الحالية.');
                }
            };

            const handleResetAllWeights = () => {
                if (confirm('هل أنت متأكد من إعادة تعيين جميع الأوزان؟ سيتم حذف الأوزان الحالية والسجل بالكامل.')) {
                    setWeightsData({});
                    alert('تمت إعادة تعيين جميع الأوزان بنجاح.');
                }
            };

            const updateEditorDayPlan = (updater) => {
                setCustomPlans(prev => {
                    const base = normalizeDayPlan(editorDay, prev[editorDay] ? cloneDeep(prev[editorDay]) : null);
                    const updated = updater(base);
                    return {
                        ...prev,
                        [editorDay]: updated
                    };
                });
            };

            const createEditorId = (prefix) => `${prefix}-${Date.now()}-${Math.floor(Math.random() * 100000)}`;

            const handleEditorExerciseChange = (index, field, value) => {
                updateEditorDayPlan((plan) => {
                    if (field === 'sets') {
                        plan.exercises[index][field] = toSafeInt(value, 3, 0, 20);

                        plan.exercises[index][field] = value;
